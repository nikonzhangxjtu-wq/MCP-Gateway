mcp:
  gateway:
    services:
      - id: amap
        name: AMap MCP
        description: Official AMap remote MCP service for maps, POI, weather, routes, and app deep links
        tags: [amap, gaode, map, location, weather, route, 高德, 地图, 天气, 路线]
        transport: streamable-http
        url: https://mcp.amap.com/mcp?key={api_key}
        timeoutMs: 20000
        requiresUserCredential: true
        credentialRequirements:
          - name: api_key
            description: 高德开放平台 Web 服务 Key
            secret: true
      - id: feishu
        name: Feishu MCP
        description: Mock Feishu collaboration service for local MCP gateway validation
        tags: [feishu, messaging, docs]
        transport: streamable-http
        url: /mock/feishu/mcp
        timeoutMs: 15000
        requiresUserCredential: true
        bootstrapTools: feishu
        defaultCredentials:
          - userId: alice
            tenantId: default
            type: bearer
            value: mock-feishu-user-token
      - id: fetch
        name: Fetch MCP
        description: Fetch public web content
        tags: [web, http, fetch, 网页, 抓取]
        transport: stdio
        command: uvx
        args: ["mcp-server-fetch"]
        timeoutMs: 20000
        requiresUserCredential: false
      - id: sandbox
        name: Sandbox MCP
        description: Manage isolated Docker sandboxes for agent runs
        tags: [sandbox, docker, runtime, agent, 沙盒, 隔离]
        transport: streamable-http
        url: /sandbox/mcp
        timeoutMs: 30000
        requiresUserCredential: false
        bootstrapTools: sandbox
      - id: filesystem
        name: Filesystem MCP
        description: Read files from the local gateway sandbox
        tags: [files, local, knowledge, 文件, 本地]
        transport: stdio
        command: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "./sandbox"]
        workingDirectory: "."
        timeoutMs: 15000
        requiresUserCredential: false
      - id: github
        name: GitHub MCP
        description: Read GitHub repository metadata and issues
        tags: [github, code, issues, repository]
        transport: stdio
        command: docker
        args: ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "-e", "GITHUB_READ_ONLY=1", "ghcr.io/github/github-mcp-server"]
        timeoutMs: 30000
        requiresUserCredential: false
        enabled: false
      - id: time
        name: Time MCP
        description: Read current time and convert time zones
        tags: [time, timezone, clock, 时间, 时区]
        transport: stdio
        command: uvx
        args: ["mcp-server-time"]
        timeoutMs: 15000
        requiresUserCredential: false
